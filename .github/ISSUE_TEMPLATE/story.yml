name: Story
description: User-facing feature or behavior
title: '[Story] '
labels: ['type: story']
body:
  - type: textarea
    id: user_story
    attributes:
      label: User Story
      description: Describe the feature from the user's perspective.
      placeholder: 'As a member, I want to join a team using a code so that I can participate with friends.'
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend
        - Membership Frontend
        - Admin Frontend
        - Full Stack
        - Design / Product
    validations:
      required: true

  - type: textarea
    id: related_epic
    attributes:
      label: Related Epic
      description: Link the planning epic this story belongs to.
      placeholder: 'Related to planning#2'
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: Requirements
      placeholder: |
        - User can...
        - System should...
        - Error state should...
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] User can complete the flow
        - [ ] Loading state is handled
        - [ ] Error state is handled
        - [ ] Works on mobile and desktop if frontend
        - [ ] Tested locally
    validations:
      required: true
