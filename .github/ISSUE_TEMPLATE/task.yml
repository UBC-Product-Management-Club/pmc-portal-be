name: Task
description: Technical or internal work
title: '[Task] '
labels: ['type: task']
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What technical work needs to be done?
      placeholder: 'Example: Refactor event card components into reusable UI modules.'
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend
        - Membership Frontend
        - Admin Frontend
        - Full Stack
        - Design / Product
    validations:
      required: true

  - type: textarea
    id: related_epic
    attributes:
      label: Related Epic
      placeholder: 'Related to planning#2'
    validations:
      required: false

  - type: textarea
    id: implementation_notes
    attributes:
      label: Implementation Notes
      placeholder: |
        - Files/components likely affected:
        - Technical approach:
        - Risks:
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] Code is cleaned up
        - [ ] Existing behavior still works
        - [ ] No regressions introduced
        - [ ] Tested locally
    validations:
      required: true
